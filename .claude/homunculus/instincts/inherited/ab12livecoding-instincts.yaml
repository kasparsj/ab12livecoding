# Ab12livecoding Workflow Add New Study Track

## Action

Follow the add-new-study-track workflow:
1. Create or update studies/<track>/README.md
2. Add studies/<track>/research-summary.md
3. Add studies/<track>/source-map.md
4. Add studies/<track>/tidal/*.tidal (example or skeleton files)
5. Optionally add other supporting markdown files (e.g., performance-cues.md, production-notes.md)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: studies/*/README.md, studies/*/research-summary.md, studies/*/source-map.md

